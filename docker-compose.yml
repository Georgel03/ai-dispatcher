version: '3.8'

services:
  # 1. Baza de Date (PostgreSQL + PostGIS)
  db:
    image: postgis/postgis:15-3.3
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=adminpass
      - POSTGRES_DB=dispatcher_db
    ports:
      - "5432:5432"

  # 2. Interfața Vizuală pentru Baza de Date (NOU)
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  # 3. Backend (FastAPI + OR-Tools)
  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:adminpass@db:5432/dispatcher_db
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_cHJvbXB0LW1vY2Nhc2luLTYyLmNsZXJrLmFjY291bnRzLmRldiQ
      - CLERK_SECRET_KEY=sk_test_IR7L5Ac1GM0Q0wjTnML9B6SUHvhXgP4anLyOHqtxGN
      - CLERK_WEBHOOK_SECRET=whsec_WOlZTBbsevIuvN3u9kxZsvOvpDnG93A7
    depends_on:
      - db

  # 4. Frontend (Next.js - vom crea fișierele imediat)
  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000" # Mapăm portul Vite default
    environment:
      - WATCHPACK_POLLING=true # Necesar pentru hot-reload pe Windows/Docker
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_cHJvbXB0LW1vY2Nhc2luLTYyLmNsZXJrLmFjY291bnRzLmRldiQ

volumes:
  postgres_data: